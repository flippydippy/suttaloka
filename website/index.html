<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Suttāloka · Pāli Sutta Library</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400..800;1,400..800&family=Gentium+Book+Plus:ital,wght@0,400;0,700;1,400;1,700&family=Karla:wght@400;500;600;700&family=Vazirmatn:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>☸</text></svg>">
</head>
<body data-theme="light" data-view="side" data-lang="en">

<div id="progress"></div>

<!-- ───────── Home / library view ───────── -->
<main id="home" class="view">
  <header class="hero">
    <button class="theme-btn" id="themeBtn" title="Toggle light / dusk" aria-label="Toggle theme">
      <svg class="ic-sun" viewBox="0 0 24 24" width="17" height="17" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"><circle cx="12" cy="12" r="4.4"/><path d="M12 2.5v2.4M12 19.1v2.4M2.5 12h2.4M19.1 12h2.4M4.9 4.9l1.7 1.7M17.4 17.4l1.7 1.7M19.1 4.9l-1.7 1.7M6.6 17.4l-1.7 1.7"/></svg>
      <svg class="ic-moon" viewBox="0 0 24 24" width="17" height="17" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M20.4 14.2A8.5 8.5 0 0 1 9.8 3.6a8.5 8.5 0 1 0 10.6 10.6z"/></svg>
    </button>
    <div class="hero-orn" aria-hidden="true"><span class="wheel">&#x2638;&#xFE0E;</span></div>
    <h1 class="hero-title">Sutt<span class="lig">ā</span>loka</h1>
    <p class="hero-sub">A reading room for the Buddha's discourses — <i>Pāli &amp; translation, side by side</i></p>
    <div class="searchbox" id="searchBox">
      <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="7"/><path d="m20 20-3.8-3.8"/></svg>
      <input id="searchInput" type="search" placeholder="Search suttas, words, or phrases — try “metta” or “sensation”" autocomplete="off" spellcheck="false">
      <kbd>/</kbd>
    </div>
    <p class="search-hint">Diacritic-free typing works: <i>panna</i> finds <i>paññā</i></p>
  </header>
  <section id="results" class="results" hidden></section>
  <section id="library" class="library"></section>
  <footer class="foot">
    <div class="rule-orn" aria-hidden="true"><span>❁</span></div>
    <p>Sabbadānaṁ dhammadānaṁ jināti — the gift of Dhamma excels all gifts</p>
  </footer>
</main>

<!-- ───────── Reader view ───────── -->
<main id="reader" class="view" hidden>
  <nav class="toolbar">
    <button class="tb-back" id="backBtn" title="Back to library">
      <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M15.5 19 8 12l7.5-7"/></svg>
      <span id="crumbRef">Library</span>
    </button>
    <div class="tb-center">
      <div class="seg" role="tablist" aria-label="View mode">
        <button data-mode="side"  class="on" role="tab">Side by side</button>
        <button data-mode="stack" role="tab">Stacked</button>
        <button data-mode="trans" role="tab">Translation</button>
      </div>
    </div>
    <div class="tb-right">
      <div class="lang-menu" id="langMenu">
        <button class="lang-btn" id="langBtn" aria-haspopup="listbox" aria-expanded="false" title="Translation language">
          <svg viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M3.5 12h17M12 3.5c2.6 2.3 3.9 5.2 3.9 8.5s-1.3 6.2-3.9 8.5c-2.6-2.3-3.9-5.2-3.9-8.5s1.3-6.2 3.9-8.5z"/></svg>
          <span id="langLabel">English</span>
          <svg class="chev" viewBox="0 0 24 24" width="12" height="12" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="m6 9 6 6 6-6"/></svg>
        </button>
        <ul class="lang-list" id="langList" role="listbox" hidden>
          <li><button data-lang="en" role="option"><b>English</b><span>definitions &amp; translation</span></button></li>
          <li><button data-lang="fa" role="option"><b>فارسی</b><span>Persian</span></button></li>
          <li><button data-lang="hi" role="option"><b>हिन्दी</b><span>Hindi</span></button></li>
        </ul>
      </div>
      <button class="tb-icon" id="fontMinus" title="Smaller text">A<sup>−</sup></button>
      <button class="tb-icon" id="fontPlus" title="Larger text">A<sup>+</sup></button>
      <button class="tb-icon theme-btn" id="themeBtn2" title="Toggle light / dusk">
        <svg class="ic-sun" viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"><circle cx="12" cy="12" r="4.4"/><path d="M12 2.5v2.4M12 19.1v2.4M2.5 12h2.4M19.1 12h2.4M4.9 4.9l1.7 1.7M17.4 17.4l1.7 1.7M19.1 4.9l-1.7 1.7M6.6 17.4l-1.7 1.7"/></svg>
        <svg class="ic-moon" viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M20.4 14.2A8.5 8.5 0 0 1 9.8 3.6a8.5 8.5 0 1 0 10.6 10.6z"/></svg>
      </button>
    </div>
  </nav>
  <article class="page" id="page"></article>
</main>

<!-- ───────── Word definition sheet ───────── -->
<aside id="sheet" class="sheet" hidden aria-live="polite">
  <div class="sheet-card">
    <button class="sheet-close" id="sheetClose" aria-label="Close definition">
      <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"><path d="M6 6l12 12M18 6 6 18"/></svg>
    </button>
    <div class="sheet-body" id="sheetBody"></div>
  </div>
</aside>

<script src="data/suttas.js"></script>
<script src="data/lexicon-en.js"></script>
<script src="data/dictionary.js"></script>
<script src="data/dictionary-fa.js"></script>
<script src="data/meta.js"></script>
<script src="app.js"></script>
</body>
</html>
